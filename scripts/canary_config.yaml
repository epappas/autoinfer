name: qwen3-8b-canary-constraint-violation

# Canary config: the seed config violates a compatibility rule on purpose
# (kv_cache_dtype=fp8 with attention_backend=XFORMERS, rejected by
# knobs.yaml's kv_fp8_requires_compatible_backend rule). The L1 adapter
# must classify this as FailureKind.STARTUP BEFORE any vLLM subprocess
# is spawned. Zero GPU time is burned; the trial log is the proof that
# the fail-fast path works.
#
# Run with:
#   uv run autoinfer run scripts/canary_config.yaml
#
# Expected result: one trial, one FailureRecord of kind STARTUP, no
# measurement, Pareto frontier empty, run.log shows the trial rejected.

harness:
  driver:
    trace_path: ./trace/sharegpt_sample.jsonl
    duration_s: 60
    slo_ttft_p99_ms: 800.0
    slo_tpot_p99_ms: 80.0
  gate:
    replica_uri: http://127.0.0.1:8001
    prompts_path: ./quality/500_prompts.jsonl
    smoke_prompts: 10
    full_prompts: 10
    batch_sizes: [1, 8]
    max_kl: 0.05
  ledger:
    output_dir: ./runs/canary
    pareto_axes: [tokens_per_sec, tpot_p99_ms, peak_hbm_gb]

policy:
  warmstart:
    provider: deterministic
    llm_model: deterministic
    n_configs: 1
    seed_configs:
      - max_num_batched_tokens: 2048
        max_num_seqs: 128
        enable_chunked_prefill: true
        block_size: 16
        kv_cache_dtype: fp8
        gpu_memory_utilization: 0.90
        enable_prefix_caching: false
        attention_backend: XFORMERS
        num_scheduler_steps: 1
        swap_space: 4
        dtype: auto
        quantization: none
  surrogate:
    kind: random
    seed: 0

layers:
  l1_engine:
    model: Qwen/Qwen3-8B
    knobs_path: ../src/autoinfer/layers/l1_engine/knobs.yaml
    max_trials: 1
    candidate_port: 8000
    startup_timeout_s: 60

target:
  kind: local
