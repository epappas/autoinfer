# Joint L1 x L2 x L3 campaign — full thesis test.
#
# Adds L3 (kernel search) on top of the L1 x L2 joint config. Uses the
# LLM kernel proposer to generate Triton/PyTorch kernel candidates for
# rmsnorm/silu_mul/rope; the L3 adapter validates correctness against
# the PyTorch reference and times throughput at the largest shape in
# the regime.
#
# L3 trials are CHEAP (CPU-only adapter compiles + runs the candidate
# directly inside the campaign container; no remote deployment per
# trial). Real kernel-vs-kernel speedup data needs a GPU; the campaign
# container's A100 is fine for that.

name: qwen3-8b-l1-l2-l3-joint

harness:
  driver:
    trace_path: ./trace/sharegpt_full.json
    duration_s: 900
    slo_ttft_p99_ms: 1500.0
    slo_tpot_p99_ms: 150.0
    dataset_name: sharegpt
    num_prompts: 64
  gate:
    replica_uri: http://127.0.0.1:8001
    prompts_path: ./quality/500_prompts.jsonl
    smoke_prompts: 20
    full_prompts: 500
    batch_sizes: [1]
    max_kl: 5.0
    calibrate_self_kl: true
    calibration_multiplier: 5.0
  ledger:
    output_dir: ./runs/qwen3-8b-l1-l2-l3-joint
    pareto_axes: [tokens_per_sec, tpot_p99_ms, peak_hbm_gb]

policy:
  warmstart:
    # Kimi 2.6 (Moonshot AI). OpenAI-compatible API at api.moonshot.ai.
    # kimi-k2.6 emits reasoning_content alongside content — temperature
    # is locked to 1.0 by the model and reasoning consumes ~150-300
    # tokens of headroom even for trivial replies, so max_tokens is
    # bumped to 8192 to fit kernel-proposal source-code emit.
    provider: openai_compatible
    base_url: https://api.moonshot.ai/v1
    llm_model: kimi-k2.6
    temperature: 1.0
    max_tokens: 8192
    n_configs: 4
    api_key_env: KIMI_API_KEY
    hardware_notes: |
      Joint L1 x L2 x L3 search on Qwen3-8B + ShareGPT.

      Layers in scope this campaign:
        L1 (engine config) — vLLM knobs on the campaign container's
          local GPU. Trials ~2-3 min each.
        L2 (topology) — per-trial Basilica deployments across GPU
          classes (H100/A100/RTX A6000). Trials ~20-25 min each.
        L3 (kernel) — LLM-proposed kernel candidates compiled and
          validated against PyTorch references for rmsnorm/silu_mul/
          rope. Trials ~10-30 sec each (CPU-only adapter).

      L3 specifics for the kernel proposer:
        - Available target_op values: rmsnorm, silu_mul, rope.
        - Available shape_regime: small / medium / large (regime
          controls the test-matrix shapes).
        - Triton kernels (@triton.jit) are compiled correctly via the
          tempfile-import path; CPU-only runs of @triton.jit will
          fail at first call (typed STARTUP failure, useful signal).
        - Reference implementations for each op are shown to the LLM
          inside the prompt as a baseline to beat.

      Hardware-compat for L1/L2:
        - FP8 KV / FP8 weights only on H100 (sm_90). ANY of
          quantization=fp8, kv_cache_dtype in {fp8, fp8_e4m3, fp8_e5m2}
          fail STARTUP on A100 and A6000.
        - For Campaign 03, the campaign container runs on 1x H100
          (sm_90). L1 trials CAN use fp8 quantization / kv-cache here.
          For Campaign 01 and 02 the container was 2x A100 (sm_80) and
          fp8 was infeasible at L1.
        - bfloat16 preferred on all three for Qwen3-8B stability.
        - ALWAYS set enable_chunked_prefill=true on L1. With it false,
          max_num_batched_tokens must equal Qwen3-8B's max_model_len
          (32768); smaller values cause vLLM to reject longer prompts.
          The catalog enforces this; proposing chunked_prefill=false
          with batched_tokens<32768 just wastes the trial.

      What to explore:
        - L3 wins where they exist: a faster RMSNorm via Triton on
          A100 is the most likely first kernel-level win.
        - L1 wins on the campaign container's hardware once feasible
          regions are identified (failure-aware surrogate now learns
          to avoid infeasible configs).
        - L2 to confirm hardware-class dominance and feed reserve-on-
          stale into a second-pass L1 search.
  surrogate:
    kind: tpe
    seed: 0
    # Constrained BO via FeasibilityModel: reject candidates whose
    # nearest-neighbor history is failure-dense. L1 needs this most
    # (kv_cache_dtype=fp8 + sm_80 etc. structurally infeasible) but
    # the surrogate is configured globally, so L3's clean surface
    # also runs through the filter — its predict_proba returns 1.0
    # on success-rich neighborhoods so the resampling overhead is
    # negligible there.
    feasibility_threshold: 0.4
    feasibility_max_resamples: 8
    feasibility_k: 3
    feasibility_min_observations: 4
  fidelity:
    rungs: [100, 500]
    eta: 3
  operator:
    # Same provider as warmstart — uses warmstart's base_url, api_key_env,
    # temperature, max_tokens. llm_model can differ but for kimi-k2.6 we
    # match it directly.
    llm_model: kimi-k2.6
    cadence: 4

layers:
  l1_engine:
    model: Qwen/Qwen3-8B
    knobs_path: src/autoinfer/layers/l1_engine/knobs.yaml
    # 14 base + 6 reserve: gives the failure-aware surrogate room to
    # exercise its KDE *and* leaves runway for a 2nd-pass after L2
    # stale-fires. See campaign 01 doc Q2/Q3.
    max_trials: 14
    reserve_cap: 6
    candidate_port: 8000
    startup_timeout_s: 600
  l2_topology:
    model: Qwen/Qwen3-8B
    knobs_path: src/autoinfer/layers/l2_topology/knobs.yaml
    max_trials: 4
    reserve_cap: 2
    memory: 64Gi
    ttl_seconds: 3600
    deploy_timeout_s: 2100
  l3_kernel:
    model: Qwen/Qwen3-8B
    knobs_path: src/autoinfer/layers/l3_kernel/knobs.yaml
    # mode='vllm' ships the candidate kernel into vLLM via runtime
    # monkeypatch, runs vllm bench serve, and reports REAL end-to-end
    # token throughput in the same units as L1/L2. This is the load-
    # bearing kernel-into-vLLM integration. mode='cpu' (the default)
    # times kernels in isolation and produces ops/sec — useful for
    # development without a GPU but Pareto-ineligible for the joint
    # frontier.
    mode: vllm
    # Campaign 03: narrow-replication paired-control L3 warmstart.
    # 3 cells × N=3 paired-control replicates = 9 (ref, novel) pairs
    # = 18 trials. Cells chosen to test reproducibility of Campaign
    # 02's spread:
    #   1. rmsnorm/float16/large — the +14.7% NOV win in C02 (T-26-followup)
    #   2. rmsnorm/bfloat16/medium — the −11.13% NOV loss in C02
    #   3. silu_mul/float16/large — the +0.77% tie in C02
    # Each cell with N=3 paired observations turns C02's "1 datapoint
    # per cell can't distinguish lucky-novel-emission from real win"
    # into per-cell win-rate (e.g. 3/3 wins, 0/3 wins, 1/3 wins) which
    # is publishable evidence.
    paired_control: true
    paired_control_cells:
      - [rmsnorm,  float16,  large]
      - [rmsnorm,  bfloat16, medium]
      - [silu_mul, float16,  large]
    paired_control_replicates: 3
    # warmstart_n=18 = 3 cells × 3 replicates × 2 (ref + novel).
    warmstart_n: 18
    # 22 base = 18 paired-control warmstart + 4 surrogate / operator
    # headroom. reserve_cap=4 unchanged from C02.
    max_trials: 22
    reserve_cap: 4
    atol: 1e-3
    rtol: 1e-3
    perf_repeats: 5
    warmup_runs: 2
    candidate_port: 8200
    startup_timeout_s: 600

target:
  kind: local
