# L2 topology campaign — varies GPU class / count via per-trial Basilica
# deployments. Reference replica stays local in the campaign container;
# candidates run on remote spot nodes. Requires OPENROUTER_API_KEY and
# BASILICA_API_TOKEN in env (orchestrator forwards both).

name: qwen3-8b-l2-topology

harness:
  driver:
    trace_path: ./trace/sharegpt_full.json
    duration_s: 900
    slo_ttft_p99_ms: 1500.0
    slo_tpot_p99_ms: 150.0
    dataset_name: sharegpt
    num_prompts: 64
  gate:
    # Reference is the local vllm-serve started by campaign_runner on GPU 1.
    replica_uri: http://127.0.0.1:8001
    prompts_path: ./quality/500_prompts.jsonl
    smoke_prompts: 20
    full_prompts: 500
    batch_sizes: [1]
    max_kl: 2.0
    calibrate_self_kl: true
    calibration_multiplier: 5.0
  ledger:
    output_dir: ./runs/qwen3-8b-l2-topology
    pareto_axes: [tokens_per_sec, tpot_p99_ms, peak_hbm_gb]

policy:
  warmstart:
    provider: openai_compatible
    base_url: https://openrouter.ai/api/v1
    llm_model: anthropic/claude-sonnet-4
    n_configs: 4
    api_key_env: OPENROUTER_API_KEY
    hardware_notes: |
      Heterogeneous-GPU search on Basilica spot marketplace.
      Each trial provisions a fresh deployment; reference replica stays
      on the campaign container's local GPU, bfloat16.

      Available GPU types right now (sampled from list_secure_cloud_gpus):
        - H100 (Hopper, sm_90, 80 GB, FP8-capable) — top tier
        - A100 (Ampere, sm_80, 40 or 80 GB) — strong mid
        - RTX A6000 (Ampere, sm_86, 48 GB) — baseline

      This is the thesis's load-bearing experiment: do the same knob
      settings behave differently across GPU classes? Key axes:
        - gpu_type (3 SKUs above)
        - gpu_count (1 or 2)
        - dtype (auto / float16 / bfloat16)
        - gpu_memory_utilization (0.80 - 0.92)
        - enforce_eager (true/false)

      Hardware-compat rules to respect:
        - Only H100 supports FP8 KV / FP8 weights; quantization=fp8 fails
          startup on A100 and A6000.
        - bfloat16 is preferred on all three for Qwen3-8B stability.

      What to explore:
        - H100 vs A6000 at gpu_count=1: how much throughput does top tier
          buy over baseline?
        - A100 at gpu_count=1: mid-tier inflection point
        - bfloat16 vs float16 at the same hardware (numerical drift)
  surrogate:
    kind: tpe
    seed: 0
  fidelity:
    rungs: [100, 500]
    eta: 3
  operator:
    llm_model: anthropic/claude-sonnet-4
    cadence: 3

layers:
  l2_topology:
    model: Qwen/Qwen3-8B
    knobs_path: src/autoinfer/layers/l2_topology/knobs.yaml
    # Each L2 trial provisions a fresh Basilica deployment: ~5-15 min
    # image/weights pull + ~3-5 min vllm warmup + bench + teardown.
    # Budget 25-35 min per trial; 3 trials keeps the iteration-zero
    # validation under 2 hours wall clock.
    max_trials: 3
    memory: 64Gi
    ttl_seconds: 3600
    deploy_timeout_s: 2100

target:
  kind: local
